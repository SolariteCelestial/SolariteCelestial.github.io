<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Console</title>

    <style>
        body {
            margin: 0;
            font-family: "Orbitron", Arial, sans-serif;
            background: radial-gradient(circle at center, #0b0f1a, #02040a);
            color: #00e5ff;
        }

        /* Center container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* Title */
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px #00e5ff, 0 0 20px #0077ff;
            margin-bottom: 40px;
        }

        /* Button style */
        .btn {
            padding: 15px 30px;
            margin: 10px;
            border: 2px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #00e5ff;
            color: #000;
            box-shadow: 0 0 15px #00e5ff;
        }

        /* Panel effect */
        .panel {
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }
    </style>

    <!-- Sci-fi font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>Command Console</h1>

        <a href="Flagon.html" class="btn">Enter Flagon</a>

        <!-- Add more buttons here -->
        <!-- <a href="game.html" class="btn">Launch Game</a> -->
    </div>
</div>

</body>
</html>
